services:
  - type: web
    name: habitacion-poblenou-suite
    runtime: node
    plan: free
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: AUTH_USERNAME
        sync: false
      - key: AUTH_PASSWORD
        sync: false
      - key: AUTH_JWT_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false